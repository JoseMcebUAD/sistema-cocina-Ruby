spring.datasource.url=jdbc:mysql://localhost:3306/cocina_rubi_test
spring.datasource.username=root
spring.datasource.password=

# ── Flyway: ejecuta migraciones completas en la DB de test ───────────────────
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true
spring.flyway.clean-disasbled=false
spring.flyway.repair-on-migrate=true

# ── JPA ──────────────────────────────────────────────────────────────────────
spring.jpa.hibernate.ddl-auto=none
spring.jpa.hibernate.naming.physical-strategy=org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl

# ── JWT (misma clave para tests) ─────────────────────────────────────────────
jwt.secret=dGhpcy1pcy1hLXNlY3JldC1rZXktZm9yLWNvY2luYS1yaWNreS1zeXN0ZW0=

# ── Cloudinary (valores dummy — tests no suben archivos) ─────────────────────
cloudinary.cloud-name=test-cloud
cloudinary.api-key=000000000000000
cloudinary.api-secret=test-secret

# ── Misc ─────────────────────────────────────────────────────────────────────
spring.main.banner-mode=off
