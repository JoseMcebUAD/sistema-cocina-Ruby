spring.application.name=cocina_rubi

spring.datasource.url=jdbc:mysql://localhost:3306/cocina_rubi
spring.datasource.username=root
spring.datasource.password=
#para que no arranque automáticamente el archivo docker del proyecto
spring.docker.compose.enabled=false
#debug=true

spring.jpa.hibernate.naming.physical-strategy=org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl
# Clave JWT: base64 de al menos 32 bytes (256 bits). CAMBIAR en produccion.
jwt.secret=dGhpcy1pcy1hLXNlY3JldC1rZXktZm9yLWNvY2luYS1yaWNreS1zeXN0ZW0=

springdoc.swagger-ui.path=/cocina-rubi-doc-api.html
#quita el putisimo banner cawn
spring.main.banner-mode=off

spring.jpa.hibernate.ddl-auto=none

spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true

management.endpoints.web.exposure.include=health,metrics,info


#cloudinary
cloudinary.cloud-name=
cloudinary.api-key=
cloudinary.api-secret=

# Multipart — límites para subida de imágenes a Cloudinary
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=25MB

