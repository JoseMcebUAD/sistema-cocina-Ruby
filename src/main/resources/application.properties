spring.application.name=cocinarubi

# Datasource — valores por variable de entorno (nunca hardcodeados en produccion)
spring.datasource.url=${DATABASE_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}

# JPA — naming explicito para respetar @Column(name="...") sin conversion automatica
spring.jpa.hibernate.ddl-auto=none
spring.jpa.hibernate.naming.physical-strategy=org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl

# Flyway
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true

# JWT
jwt.secret=${JWT_SECRET}

# Swagger / OpenAPI
springdoc.swagger-ui.path=/api-doc.html

# Actuator
management.endpoints.web.exposure.include=health
